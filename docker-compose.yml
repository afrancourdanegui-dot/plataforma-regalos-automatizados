services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: siempre_presente
      POSTGRES_PASSWORD: siempre_presente_dev
      POSTGRES_DB: siempre_presente
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siempre_presente"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
